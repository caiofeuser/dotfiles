##### ── Modern Spacious Look ─────────────────────────────────────────────
# ═══════════════════════════════════════════════════════════════════════
#  LEADER KEY
# ═══════════════════════════════════════════════════════════════════════
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# ═══════════════════════════════════════════════════════════════════════
# Terminal configuration
# ═══════════════════════════════════════════════════════════════════════
# so the color is right
set-option -sa terminal-overrides ",xterm*:Tc"

# 3. Suporte para Undercurl (os sublinhados que evitam o fundo rosa)
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# ═══════════════════════════════════════════════════════════════════════
# PLUGIN MANAGER (TPM)
# ═══════════════════════════════════════════════════════════════════════

# List of plugins
 set -g @plugin 'tmux-plugins/tpm'
 set -g @plugin 'tmux-plugins/tmux-sensible'
 set -g @plugin 'tmux-plugins/tmux-resurrect'
 set -g @plugin 'tmux-plugins/tmux-continuum'
 set -g @plugin 'tmux-plugins/tmux-yank'
 set -g @plugin 'sainnhe/tmux-fzf'
 set -g @plugin 'tmux-plugins/tmux-open'
 set -g @plugin 'dreamsofcode-io/catppuccin-tmux'

# Plugin settings
# tmux-continuum: auto-save every 15 minutes
set -g @continuum-save-interval '15'
# # tmux-continuum: auto-restore on tmux start
set -g @continuum-restore 'on'
# # tmux-resurrect: restore vim sessions too
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'
# # tmux-resurrect: capture pane contents
set -g @resurrect-capture-pane-contents 'on'
# tmux-fzf: launch with prefix + F
TMUX_FZF_LAUNCH_KEY="F"
set -g @catppuccin_status_modules_right "session copy date_time"
set -g @catppuccin_session_text "#S"
set -g @catppuccin_date_time_text "%d %b %H:%M"
set -g @catppuccin_copy_icon "󰆏"
set -g @catppuccin_copy_text "COPY"


# ═══════════════════════════════════════════════════════════════════════
# PANE BORDERS & TITLES
# ═══════════════════════════════════════════════════════════════════════
# set -g @catppuccin_window_middle_separator ""
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_text "#W"
set -g @catppuccin_window_status_enable "yes"
set -g @catppuccin_window_status_icon_enable "no"

setw -g automatic-rename on
setw -g automatic-rename-format "#{pane_current_command}"
# ═══════════════════════════════════════════════════════════════════════
# CORE SETTINGS
# ═══════════════════════════════════════════════════════════════════════

# Mouse support
set -g mouse on
set -g status-position top
# Start numbering at 1 (easier keyboard access)
set -g base-index 1
setw -g pane-base-index 1

# Vi mode for copy-mode
setw -g mode-keys vi

# ═══════════════════════════════════════════════════════════════════════
# NAVIGATION - Vim-style + helpful pane selection
# ═══════════════════════════════════════════════════════════════════════

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Show pane numbers longer for easier selection
set -g display-panes-time 2000

# Open panes in current directory
bind '"' split-window -v -c "#{pane_current_path}"
bind '%' split-window -h -c "#{pane_current_path}"

# ═══════════════════════════════════════════════════════════════════════
# COPY MODE - Vim-style bindings
# ═══════════════════════════════════════════════════════════════════════

# Enter copy mode with prefix + [
bind [ copy-mode

# Vim-style selection and yanking in copy mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi Escape send-keys -X cancel

# Paste with prefix + ]
bind ] paste-buffer

# ═══════════════════════════════════════════════════════════════════════
# SESSION MANAGEMENT
# ═══════════════════════════════════════════════════════════════════════

# Quick session creation with name prompt
bind C command-prompt -p "New session name:" "new-session -s '%%'"

# Kill current session and switch to another (or create new if none exist)
bind X confirm-before -p "Kill session #S? (y/n)" "run-shell 'tmux switch-client -n \\\; kill-session -t \"#S\"'"

# ═══════════════════════════════════════════════════════════════════════
# PANE SYNCHRONIZATION
# ═══════════════════════════════════════════════════════════════════════

# Toggle synchronize-panes (send commands to all panes in window)
bind y setw synchronize-panes \; display-message "synchronize-panes: #{?pane_synchronized,ON,OFF}"

# ═══════════════════════════════════════════════════════════════════════
# TITLE MANAGEMENT
# ═══════════════════════════════════════════════════════════════════════

bind t command-prompt -I "#W" \
  -p "Set window title:" "rename-window '%%'"
bind T setw automatic-rename on \; display-message "window title: auto"

# ═══════════════════════════════════════════════════════════════════════
# ACTIVITY & NOTIFICATIONS
# ═══════════════════════════════════════════════════════════════════════

set -g visual-bell off
set -g bell-action any
set -g monitor-activity on
set -g activity-action other
set -g visual-activity off  # Disable activity messages, keep highlights
set -g visual-silence off

# ═══════════════════════════════════════════════════════════════════════
# SENSIBLE DEFAULTS
# ═══════════════════════════════════════════════════════════════════════

set -g allow-rename off
set -g renumber-windows on
set -g history-limit 20000
set -g set-clipboard on
set -g escape-time 0
set -g display-time 750
set -s repeat-time 1000
set -g exit-empty off

# ═══════════════════════════════════════════════════════════════════════
# RELOAD CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════

bind r source-file ~/.tmux.conf \; display-message "  Config reloaded!"

run '~/.tmux/plugins/tpm/tpm'
set -g status-bg "#212437"
